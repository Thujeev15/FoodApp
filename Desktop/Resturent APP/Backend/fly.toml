app = "foodapp-g2709a"
primary_region = "sin"

[build]
	dockerfile = "Dockerfile"

[env]
	NODE_ENV = "production"
	PORT = "5001"

[[services]]
	internal_port = 5001
	protocol = "tcp"

	[services.concurrency]
		type = "connections"
		hard_limit = 25
		soft_limit = 20

	[[services.ports]]
		port = 80
		handlers = ["http"]
		force_https = true

	[[services.ports]]
		port = 443
		handlers = ["tls", "http"]
